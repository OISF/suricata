[package]
name = "suricata-config-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
suricata-config = { path = ".." }

# Keep fuzzing crate out of the parent workspace.
[workspace]
members = ["."]

[[bin]]
name = "loadstring"
path = "fuzz_targets/loadstring.rs"
test = false
doc = false
bench = false
